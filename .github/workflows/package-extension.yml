name: Package Extension

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  package:
    name: Build and upload extension
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 11
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type-check
        run: pnpm compile

      - name: Package extension zip
        run: pnpm zip

      - name: Prepare one-unzip artifact
        run: |
          rm -rf artifacts
          mkdir -p artifacts/context-translate-extension
          zip_file="$(find .output -maxdepth 1 -type f -name '*.zip' -print -quit)"
          if [ -z "$zip_file" ]; then
            echo "No zip file was produced by pnpm zip."
            find .output -maxdepth 2 -type f -print || true
            exit 1
          fi
          unzip -q "$zip_file" -d artifacts/context-translate-extension
          ls -lah artifacts
          ls -lah artifacts/context-translate-extension

      - name: Upload extension artifact
        uses: actions/upload-artifact@v7
        with:
          name: context-translate-extension
          path: artifacts
          if-no-files-found: error
