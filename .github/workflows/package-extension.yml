name: Package Extension

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  package:
    name: Build and upload zip
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 11
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type-check
        run: pnpm compile

      - name: Package extension zip
        run: pnpm zip

      - name: Collect zip artifact
        run: |
          mkdir -p artifacts
          zip_file="$(find .output -maxdepth 1 -type f -name '*.zip' -print -quit)"
          if [ -z "$zip_file" ]; then
            echo "No zip file was produced by pnpm zip."
            find .output -maxdepth 2 -type f -print || true
            exit 1
          fi
          cp "$zip_file" artifacts/context-translate-extension.zip
          ls -lah artifacts

      - name: Upload zip artifact
        uses: actions/upload-artifact@v7
        with:
          name: context-translate-extension
          path: artifacts/context-translate-extension.zip
          if-no-files-found: error
          compression-level: 0
